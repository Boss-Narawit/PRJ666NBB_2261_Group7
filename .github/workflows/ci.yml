name: CI Workflow

# This specifies WHEN the action runs
on:
  push:
  pull_request:
    branches: ['main']
  workflow_dispatch: # This allows you to run it MANUALLY from the GitHub website

jobs:
  # Job 1: Check code formatting and backend lint rules.
  # This is the enforcement backstop: even if a contributor's local pre-commit
  # hook never fired (e.g. they didn't run `npm install` at the repo root, so
  # husky was never activated for their clone), bad formatting/lint cannot merge.
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm ci

      - name: ESLint (backend)
        run: npx eslint backend

      - name: Prettier (all)
        run: npx prettier --check .

  # Job 2: Backend unit tests
  backend-ci:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

  # Job 3: Frontend lint (uses the @react-native eslint config in frontend/)
  frontend-ci:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci

      - name: ESLint (frontend)
        run: npm run lint

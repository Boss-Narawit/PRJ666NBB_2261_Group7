name: CI Workflow

# This specifies WHEN the action runs
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch: # This allows you to run it MANUALLY from the GitHub website

jobs:
  # Job 1: Check code formatting and rules
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install root dependencies
        run: npm ci

      - name: Check code style (ESLint & Prettier)
        run: npx eslint . --no-error-on-unmatched-pattern && npx prettier --check .

  # Job 2: Check backend
  backend-ci:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm ci

  # Job 3: Check frontend
  frontend-ci:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm ci
